<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zajíček Holding - Vlastnická struktura</title>
    <!-- Deployed: 2026-01-22 | Redesigned: 2026-03-05 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        /* ============ LUXURY FINANCIAL ATLAS ============ */
        :root {
            --bg-deep: #1a1a2e;
            --bg-surface: rgba(30, 30, 52, 0.90);
            --bg-elevated: rgba(38, 38, 62, 0.94);
            --bg-input: rgba(10, 10, 20, 0.35);

            --copper: #c9956b;
            --copper-bright: #e0b48a;
            --copper-dim: #9e7352;
            --copper-glow: rgba(201, 149, 107, 0.25);
            --steel: #7eb8da;
            --steel-dim: #5a8faa;
            --ruby: #c45b52;
            --ruby-light: #d4736b;
            --emerald: #4a9b7f;
            --emerald-light: #5fb896;
            --royal: #5b6abf;
            --royal-light: #7280d4;
            --lavender: #8b7ec8;
            --bronze: #b87333;
            --bronze-light: #cc8844;
            --amber: #d4a03c;
            --amber-light: #e8bb5e;
            --rose: #b85a6a;
            --rose-light: #cc7080;

            --text-warm: #e8e2d8;
            --text-mid: #b0aca4;
            --text-dim: #8a8698;
            --text-faint: #5e5b6e;
            --text-nick: #d4a03c;

            --border: rgba(201, 149, 107, 0.12);
            --border-strong: rgba(201, 149, 107, 0.25);
            --glass-bg: rgba(30, 30, 52, 0.75);
            --glass-border: rgba(201, 149, 107, 0.18);
            --glass-blur: blur(24px);
            --overlay: rgba(10, 10, 20, 0.75);

            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 16px;
            --radius-xl: 24px;

            --ease-out: cubic-bezier(0.2, 0, 0, 1);
            --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);

            --font-display: 'Playfair Display', Georgia, serif;
            --font-body: 'DM Sans', -apple-system, sans-serif;
            --font-mono: 'IBM Plex Mono', 'Menlo', monospace;
        }

        /* ============ RESET & BASE ============ */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font-body);
            background: var(--bg-deep);
            min-height: 100vh;
            overflow: hidden;
            color: var(--text-warm);
        }

        /* Noise texture overlay */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 9999;
        }

        /* ============ HEADER ============ */
        .header {
            position: fixed; top: 0; left: 0; right: 0;
            padding: 18px 32px;
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-bottom: 1px solid var(--glass-border);
            z-index: 100;
            display: flex; justify-content: space-between; align-items: center;
        }
        .header-brand {
            display: flex; align-items: center; gap: 16px;
        }
        .header-brand .logo-mark {
            width: 36px; height: 36px;
            border: 2px solid var(--copper);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-family: var(--font-display);
            font-size: 16px;
            font-weight: 700;
            color: var(--copper);
            flex-shrink: 0;
        }
        .header h1 {
            font-family: var(--font-display);
            color: var(--text-warm);
            font-size: 1.35em;
            font-weight: 600;
            letter-spacing: -0.01em;
        }
        .header h1 span {
            color: var(--copper);
        }
        .header-stats { display: flex; gap: 32px; }
        .stat { text-align: center; }
        .stat-value {
            color: var(--copper);
            font-family: var(--font-mono);
            font-size: 1.6em;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }
        .stat-label {
            color: var(--text-dim);
            font-family: var(--font-mono);
            font-size: 0.65em;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* ============ GRAPH ============ */
        #graph { width: 100vw; height: 100vh; }

        /* ============ LINKS ============ */
        .link { fill: none; stroke-opacity: 0.5; }
        .link-label {
            font-size: 10px;
            font-family: var(--font-mono);
            font-weight: 500;
            fill: var(--text-dim);
            pointer-events: none;
        }

        /* ============ NODES ============ */
        .node { cursor: pointer; }
        .node .node-ring {
            fill: none;
            stroke-width: 1.5;
            stroke-opacity: 0.3;
            stroke-dasharray: 3,3;
        }
        .node circle.node-core {
            stroke-width: 2.5px;
            transition: all 0.4s var(--ease-out);
        }
        .node:hover circle.node-core {
            stroke-width: 3.5px;
        }
        .node text {
            font-size: 11.5px;
            font-family: var(--font-body);
            font-weight: 600;
            fill: var(--text-warm);
            pointer-events: none;
            text-shadow: 0 1px 4px rgba(0,0,0,0.9), 0 0 12px rgba(0,0,0,0.5);
        }
        .node .ico {
            font-size: 9px;
            font-family: var(--font-mono);
            fill: var(--text-dim);
            font-weight: 400;
        }
        .node .nickname {
            font-size: 9.5px;
            font-family: var(--font-mono);
            fill: var(--text-nick);
            font-weight: 500;
            text-shadow: 0 1px 4px rgba(0,0,0,0.9);
        }
        .nickname-input {
            background: rgba(0,0,0,0.85);
            border: 1.5px solid var(--amber);
            border-radius: 4px;
            color: var(--amber);
            font-size: 10px;
            font-family: var(--font-mono);
            font-weight: 500;
            text-align: center;
            padding: 2px 5px;
            outline: none;
            width: 80px;
        }

        /* ============ DETAIL PANEL ============ */
        .detail-panel {
            position: fixed; right: -440px; top: 0;
            width: 420px; height: 100vh;
            background: var(--bg-elevated);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-left: 1px solid var(--glass-border);
            box-shadow: -8px 0 40px rgba(0,0,0,0.6);
            padding: 32px;
            transition: right 0.45s var(--ease-out);
            z-index: 200;
            overflow-y: auto;
        }
        .detail-panel.open { right: 0; }
        .detail-panel::-webkit-scrollbar { width: 4px; }
        .detail-panel::-webkit-scrollbar-track { background: transparent; }
        .detail-panel::-webkit-scrollbar-thumb {
            background: var(--copper-dim);
            border-radius: 2px;
        }
        .detail-panel::-webkit-scrollbar-thumb:hover { background: var(--copper); }
        .detail-close {
            position: absolute; top: 22px; right: 22px;
            background: none; border: none;
            color: var(--text-dim); font-size: 22px; cursor: pointer;
            transition: color 0.2s;
        }
        .detail-close:hover { color: var(--copper); }
        .detail-header {
            margin-bottom: 24px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }
        .detail-type {
            display: inline-block;
            padding: 5px 14px;
            border-radius: 4px;
            font-family: var(--font-mono);
            font-size: 0.65em;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 14px;
        }
        .detail-name {
            font-family: var(--font-display);
            color: var(--text-warm);
            font-size: 1.5em;
            font-weight: 600;
            margin-bottom: 6px;
            line-height: 1.2;
        }
        .detail-ico {
            color: var(--text-dim);
            font-family: var(--font-mono);
            font-size: 0.85em;
        }
        .detail-popis {
            color: var(--copper);
            font-size: 0.9em;
            margin-top: 12px;
            padding: 14px;
            background: var(--copper-glow);
            border-radius: var(--radius-sm);
            border-left: 3px solid var(--copper);
            line-height: 1.5;
        }
        .detail-section { margin-bottom: 22px; }
        .detail-section h3 {
            color: var(--copper);
            font-family: var(--font-mono);
            font-size: 0.65em;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 12px;
        }
        .detail-row {
            display: flex; justify-content: space-between;
            padding: 9px 0;
            border-bottom: 1px solid rgba(201, 149, 107, 0.06);
        }
        .detail-row-label {
            color: var(--text-dim);
            font-size: 0.82em;
        }
        .detail-row-value {
            color: var(--text-warm);
            font-size: 0.82em;
            text-align: right;
            max-width: 60%;
        }
        .ownership-chain {
            background: var(--copper-glow);
            border-radius: var(--radius-md);
            padding: 16px;
            margin-top: 10px;
        }
        .ownership-item {
            display: flex; align-items: center;
            padding: 8px 0;
            color: var(--text-warm);
            font-size: 0.85em;
        }
        .ownership-arrow {
            color: var(--copper);
            margin: 0 10px;
            text-align: center;
            font-family: var(--font-mono);
        }
        .ownership-percent {
            color: var(--copper);
            font-family: var(--font-mono);
            font-weight: 600;
            margin-left: auto;
        }

        /* ============ DETAIL PANEL BUTTONS ============ */
        .detail-actions { display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; }
        .detail-btn {
            padding: 8px 14px;
            border: 1px solid transparent;
            border-radius: var(--radius-sm);
            font-size: 0.78em;
            font-family: var(--font-body);
            cursor: pointer;
            transition: all 0.25s var(--ease-out);
            display: inline-flex; align-items: center; gap: 6px;
        }
        .detail-btn svg { width: 13px; height: 13px; flex-shrink: 0; }
        .detail-btn.edit {
            background: rgba(91, 106, 191, 0.15);
            color: var(--royal-light);
            border-color: rgba(91, 106, 191, 0.3);
        }
        .detail-btn.edit:hover { background: rgba(91, 106, 191, 0.25); }
        .detail-btn.change-owner {
            background: rgba(201, 149, 107, 0.15);
            color: var(--copper-bright);
            border-color: rgba(201, 149, 107, 0.3);
        }
        .detail-btn.change-owner:hover { background: rgba(201, 149, 107, 0.25); }
        .detail-btn.disconnect {
            background: rgba(184, 90, 106, 0.15);
            color: var(--rose-light);
            border-color: rgba(184, 90, 106, 0.3);
        }
        .detail-btn.disconnect:hover { background: rgba(184, 90, 106, 0.25); }
        .detail-btn.delete {
            background: rgba(196, 91, 82, 0.15);
            color: var(--ruby-light);
            border-color: rgba(196, 91, 82, 0.3);
        }
        .detail-btn.delete:hover { background: rgba(196, 91, 82, 0.25); }

        /* ============ LEGEND ============ */
        .legend {
            position: fixed; bottom: 24px; left: 24px;
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            padding: 16px 20px;
            border-radius: var(--radius-lg);
            z-index: 100;
            overflow: hidden;
            transition: max-height 0.4s var(--ease-out), padding 0.4s var(--ease-out);
            max-height: 500px;
        }
        .legend.collapsed { max-height: 38px; padding: 8px 20px; }
        .legend-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 10px;
            cursor: pointer;
            user-select: none;
        }
        .legend.collapsed .legend-header { margin-bottom: 0; }
        .legend-title {
            color: var(--text-dim);
            font-family: var(--font-mono);
            font-size: 0.6em;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .legend-toggle {
            background: none; border: none;
            color: var(--text-dim);
            cursor: pointer; padding: 2px;
            transition: transform 0.3s var(--ease-out);
        }
        .legend.collapsed .legend-toggle { transform: rotate(180deg); }
        .legend-content { transition: opacity 0.3s ease; }
        .legend.collapsed .legend-content { opacity: 0; pointer-events: none; }
        .legend-item {
            display: flex; align-items: center; gap: 10px;
            margin-bottom: 5px;
            color: var(--text-mid);
            font-size: 0.75em;
        }
        .legend-circle {
            width: 12px; height: 12px;
            border-radius: 50%;
            flex-shrink: 0;
            box-shadow: 0 0 8px rgba(0,0,0,0.3);
        }
        .legend-dph {
            margin-top: 12px; padding-top: 10px;
            border-top: 1px solid var(--border);
        }
        .legend-dph-item {
            display: flex; align-items: center; gap: 8px;
            margin-bottom: 4px;
            color: var(--text-dim);
            font-size: 0.7em;
        }
        .legend-dph-dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            border: 2px solid var(--text-warm);
            flex-shrink: 0;
        }

        /* ============ CONTROLS ============ */
        .controls {
            position: fixed; bottom: 24px; right: 24px;
            display: flex; gap: 6px; z-index: 100;
            align-items: center;
        }
        .control-separator {
            width: 1px; height: 24px;
            background: var(--border-strong);
            margin: 0 4px;
        }
        .control-btn {
            width: 38px; height: 38px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--glass-border);
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            color: var(--text-mid);
            cursor: pointer;
            transition: all 0.25s var(--ease-out);
            display: flex; align-items: center; justify-content: center;
            position: relative;
        }
        .control-btn svg { width: 16px; height: 16px; }
        .control-btn:hover {
            background: var(--copper);
            color: var(--bg-deep);
            border-color: var(--copper);
        }
        .control-btn:hover svg { stroke: var(--bg-deep); }
        .control-btn.add-btn {
            background: var(--copper);
            color: var(--bg-deep);
            border-color: var(--copper);
        }
        .control-btn.add-btn svg { stroke: var(--bg-deep); }
        .control-btn.add-btn:hover { background: var(--copper-bright); border-color: var(--copper-bright); }
        .control-btn.bubble-btn {
            background: rgba(91, 106, 191, 0.2);
            color: var(--royal-light);
            border-color: rgba(91, 106, 191, 0.3);
        }
        .control-btn.bubble-btn svg { stroke: var(--royal-light); }
        .control-btn.bubble-btn:hover { background: var(--royal); border-color: var(--royal); color: #fff; }
        .control-btn.bubble-btn:hover svg { stroke: #fff; }
        .control-btn.export-btn {
            background: rgba(74, 155, 127, 0.2);
            color: var(--emerald-light);
            border-color: rgba(74, 155, 127, 0.3);
        }
        .control-btn.export-btn svg { stroke: var(--emerald-light); }
        .control-btn.export-btn:hover { background: var(--emerald); border-color: var(--emerald); color: #fff; }
        .control-btn.export-btn:hover svg { stroke: #fff; }
        .control-btn.import-btn {
            background: rgba(212, 160, 60, 0.2);
            color: var(--amber-light);
            border-color: rgba(212, 160, 60, 0.3);
        }
        .control-btn.import-btn svg { stroke: var(--amber-light); }
        .control-btn.import-btn:hover { background: var(--amber); border-color: var(--amber); color: var(--bg-deep); }
        .control-btn.import-btn:hover svg { stroke: var(--bg-deep); }

        /* ============ CSS TOOLTIPS ============ */
        [data-tooltip] { position: relative; }
        [data-tooltip]::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: calc(100% + 10px);
            left: 50%;
            transform: translateX(-50%);
            padding: 6px 12px;
            background: var(--bg-elevated);
            border: 1px solid var(--glass-border);
            color: var(--text-warm);
            border-radius: var(--radius-sm);
            font-family: var(--font-mono);
            font-size: 10px;
            white-space: nowrap;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 500;
        }
        [data-tooltip]:hover::after { opacity: 1; }

        /* ============ TOOLTIP (D3 hover) ============ */
        .tooltip {
            position: fixed;
            padding: 10px 16px;
            background: var(--bg-elevated);
            border: 1px solid var(--glass-border);
            color: var(--text-warm);
            border-radius: var(--radius-sm);
            font-size: 12px;
            font-family: var(--font-body);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 300;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }
        .tooltip .tooltip-ico {
            color: var(--text-dim);
            font-family: var(--font-mono);
            font-size: 10px;
        }
        .tooltip.visible { opacity: 1; }

        /* ============ MODAL STYLES ============ */
        .modal-overlay {
            position: fixed; inset: 0;
            background: var(--overlay);
            z-index: 400;
            display: flex; align-items: center; justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0.35s, opacity 0.35s;
        }
        .modal-overlay.open { visibility: visible; opacity: 1; }
        .modal-overlay.open .modal {
            animation: modalReveal 0.4s var(--ease-out);
        }
        @keyframes modalReveal {
            from { opacity: 0; transform: translateY(24px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .modal {
            background: var(--bg-elevated);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-xl);
            padding: 32px;
            width: 460px; max-width: 90vw; max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 24px 64px rgba(0,0,0,0.5);
        }
        .modal::-webkit-scrollbar { width: 4px; }
        .modal::-webkit-scrollbar-track { background: transparent; }
        .modal::-webkit-scrollbar-thumb { background: var(--copper-dim); border-radius: 2px; }
        .modal h2 {
            font-family: var(--font-display);
            color: var(--text-warm);
            margin-bottom: 24px;
            font-size: 1.4em;
            font-weight: 600;
        }
        .modal-field { margin-bottom: 16px; }
        .modal-field label {
            display: block;
            color: var(--text-dim);
            font-family: var(--font-mono);
            font-size: 0.7em;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 6px;
        }
        .modal-field input, .modal-field select, .modal-field textarea {
            width: 100%; padding: 11px 14px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-warm);
            font-size: 0.92em;
            font-family: var(--font-body);
            transition: border-color 0.2s;
        }
        .modal-field input:focus, .modal-field select:focus, .modal-field textarea:focus {
            outline: none;
            border-color: var(--copper);
        }
        .modal-field select { cursor: pointer; }
        .modal-field textarea { resize: vertical; min-height: 60px; }
        .modal-buttons { display: flex; gap: 10px; margin-top: 28px; }
        .modal-btn {
            flex: 1; padding: 12px;
            border: 1px solid transparent;
            border-radius: var(--radius-sm);
            font-size: 0.9em;
            font-family: var(--font-body);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s var(--ease-out);
        }
        .modal-btn.primary {
            background: var(--copper);
            color: var(--bg-deep);
        }
        .modal-btn.primary:hover { background: var(--copper-bright); }
        .modal-btn.secondary {
            background: transparent;
            color: var(--text-mid);
            border-color: var(--border-strong);
        }
        .modal-btn.secondary:hover { background: rgba(255,255,255,0.05); color: var(--text-warm); }
        .modal-btn.danger { background: var(--ruby); color: var(--text-warm); }
        .modal-btn.danger:hover { background: var(--ruby-light); }

        /* ============ DPH INDICATOR STYLES ============ */
        .dph-indicator { stroke: var(--text-warm); stroke-width: 2px; }
        .dph-badge {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 5px 12px;
            border-radius: 4px;
            font-family: var(--font-mono);
            font-size: 0.65em;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-top: 10px;
        }
        .dph-badge.platce { background: rgba(74, 155, 127, 0.15); color: var(--emerald-light); }
        .dph-badge.proces { background: rgba(212, 160, 60, 0.15); color: var(--amber-light); }
        .dph-badge.neplatce { background: rgba(196, 91, 82, 0.15); color: var(--ruby-light); }
        .dph-dot { width: 7px; height: 7px; border-radius: 50%; }

        @keyframes dphPulse {
            0%, 100% { opacity: 1; r: 7; }
            50% { opacity: 0.4; r: 9; }
        }
        .dph-pulse { animation: dphPulse 2.5s ease-in-out infinite; }

        /* ============ BUBBLE STYLES ============ */
        .bubble { cursor: move; }
        .bubble circle { stroke-width: 1.5; stroke-dasharray: 6,4; fill-opacity: 0.03; }
        .bubble .bubble-label {
            font-size: 12px;
            font-family: var(--font-mono);
            font-weight: 600;
            letter-spacing: 1px;
            pointer-events: none;
            text-shadow: 0 1px 4px rgba(0,0,0,0.8);
        }
        .bubble .resize-handle {
            cursor: ns-resize; opacity: 0.5;
            transition: opacity 0.2s, transform 0.2s;
        }
        .bubble .resize-handle:hover { opacity: 1; transform: scale(1.2); }
        .bubble:hover .resize-handle { opacity: 0.8; transform: scale(1.1); }
        .bubble .delete-handle { cursor: pointer; opacity: 0; transition: opacity 0.2s; }
        .bubble:hover .delete-handle { opacity: 1; }

        .bubble-color-picker { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
        .bubble-color-option {
            width: 32px; height: 32px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
        }
        .bubble-color-option:hover { transform: scale(1.1); }
        .bubble-color-option.selected { border-color: var(--text-warm); }

        /* ============ CUSTOM DIALOG ============ */
        .dialog-overlay {
            position: fixed; inset: 0;
            background: var(--overlay);
            z-index: 600;
            display: flex; align-items: center; justify-content: center;
            visibility: hidden; opacity: 0;
            transition: visibility 0.3s, opacity 0.3s;
        }
        .dialog-overlay.open { visibility: visible; opacity: 1; }
        .dialog-overlay.open .dialog-box {
            animation: modalReveal 0.35s var(--ease-out);
        }
        .dialog-box {
            background: var(--bg-elevated);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-xl);
            padding: 32px;
            width: 400px; max-width: 90vw;
            text-align: center;
            box-shadow: 0 24px 64px rgba(0,0,0,0.5);
        }
        .dialog-message {
            font-family: var(--font-body);
            color: var(--text-warm);
            font-size: 1em;
            margin-bottom: 28px;
            line-height: 1.6;
            white-space: pre-line;
        }
        .dialog-buttons { display: flex; gap: 10px; }
        .dialog-btn {
            flex: 1; padding: 12px;
            border: 1px solid transparent;
            border-radius: var(--radius-sm);
            font-size: 0.9em;
            font-family: var(--font-body);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s var(--ease-out);
        }
        .dialog-btn.dialog-confirm {
            background: var(--copper);
            color: var(--bg-deep);
        }
        .dialog-btn.dialog-confirm:hover { background: var(--copper-bright); }
        .dialog-btn.dialog-confirm.danger { background: var(--ruby); color: var(--text-warm); }
        .dialog-btn.dialog-confirm.danger:hover { background: var(--ruby-light); }
        .dialog-btn.dialog-cancel {
            background: transparent;
            color: var(--text-mid);
            border-color: var(--border-strong);
        }
        .dialog-btn.dialog-cancel:hover { background: rgba(255,255,255,0.05); }

        /* ============ TOAST NOTIFICATIONS ============ */
        .toast-container {
            position: fixed; top: 80px; right: 24px;
            z-index: 700;
            display: flex; flex-direction: column; gap: 8px;
        }
        .toast {
            padding: 14px 20px;
            background: var(--bg-elevated);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-md);
            color: var(--text-warm);
            font-size: 0.85em;
            display: flex; align-items: center; gap: 10px;
            animation: toastIn 0.4s var(--ease-out), toastOut 0.4s var(--ease-out) 2.6s forwards;
            max-width: 340px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        .toast svg { width: 16px; height: 16px; flex-shrink: 0; }
        .toast.success { border-left: 3px solid var(--emerald); }
        .toast.success svg { stroke: var(--emerald); }
        .toast.error { border-left: 3px solid var(--ruby); }
        .toast.error svg { stroke: var(--ruby); }
        @keyframes toastIn { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes toastOut { from { opacity: 1; } to { opacity: 0; transform: translateY(-10px); } }

        /* ============ RESPONSIVE ============ */
        @media (max-width: 768px) {
            .header { padding: 12px 16px; flex-direction: column; gap: 8px; }
            .header h1 { font-size: 1.05em; }
            .header-stats { gap: 20px; }
            .stat-value { font-size: 1.2em; }
            .detail-panel { width: 100vw; right: -100vw; }
            .control-btn { width: 44px; height: 44px; }
            .controls { gap: 5px; bottom: 12px; right: 12px; flex-wrap: wrap; justify-content: flex-end; }
            .legend { bottom: 66px; left: 10px; max-width: 180px; }
            .legend-item { font-size: 0.65em; }
        }

        /* ============ LOADING ANIMATION ============ */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .header { animation: fadeUp 0.6s var(--ease-out) 0.1s both; }
        .legend { animation: fadeUp 0.6s var(--ease-out) 0.3s both; }
        .controls { animation: fadeUp 0.6s var(--ease-out) 0.4s both; }
    </style>
</head>

        function createIconButton(svgString, labelText, className) {
            var btn = document.createElement('button');
            btn.className = className;
            var parser = new DOMParser();

            { id: "alvento", name: "Alvento Solutions s.r.o.", type: "granddaughter", ico: "24111953", sidlo: "Školská 660/3, Praha", founded: "1.1.2026", kapital: "20 000 Kč", cinnost: "Reality, obchod", popis: "Solutions firma - nová firma 2026", nickname: "Viktor", dphStatus: "neplatce" },
            { id: "carmakler_ins", name: "CAR makléř insurance s.r.o.", type: "external", ico: "", sidlo: "", founded: "", kapital: "", cinnost: "Pojištění", popis: "Vlastní manželka - plánované připojení pod CAR makléř", nickname: "", dphStatus: "neplatce" }

        var dphColors = { platce: "#4a9b7f", proces: "#d4a03c", neplatce: "#c45b52" };
        var dphLabels = { platce: "Plátce DPH", proces: "V procesu registrace", neplatce: "Neplátce DPH" };

        var defaultLinks = [
            { source: "radim", target: "holding", share: "100%" },
            { source: "radim", target: "zck", share: "100%" },
            { source: "radim", target: "market4auto", share: "100%" },
            { source: "holding", target: "consulting", share: "100%" },
            { source: "holding", target: "wikiporadce", share: "100%" },
            { source: "holding", target: "arstono", share: "100%" },

            { source: "holding", target: "ardono", share: "100%" },
            { source: "market4auto", target: "car4auto", share: "100%" },

            { source: "consulting", target: "novira", share: "100%" },

        ];

        var defaultPositions = {
            radim: { x: 835, y: 120 }, holding: { x: 835, y: 280 },
            zck: { x: 365, y: 11 }, market4auto: { x: 1021, y: -99 },

            kaldaro: { x: 1238, y: 511 }, kortado: { x: 1412, y: 186 },
            ardono: { x: 488, y: 372 }, car4auto: { x: 1083, y: -177 },
            carmakler: { x: 816, y: 626 }, novira: { x: 475, y: 542 },
            alvento: { x: 485, y: 461 }, carmakler_ins: { x: 856, y: 688 }
        };

        // ============ STORAGE ============
        var STORAGE_KEY_NODES = 'zajicek-holding-nodes';
        var STORAGE_KEY_LINKS = 'zajicek-holding-links';
        var STORAGE_KEY_POSITIONS = 'zajicek-holding-positions';
        var STORAGE_KEY_NICKNAMES = 'zajicek-holding-nicknames';
        var STORAGE_KEY_BUBBLES = 'zajicek-holding-bubbles';

        function loadData() {
            try {
                var savedNodes = localStorage.getItem(STORAGE_KEY_NODES);
                var savedLinks = localStorage.getItem(STORAGE_KEY_LINKS);
                if (savedNodes && savedLinks) return { nodes: JSON.parse(savedNodes), links: JSON.parse(savedLinks) };
            } catch (e) { console.error('Load error:', e); }
            return { nodes: JSON.parse(JSON.stringify(defaultNodes)), links: JSON.parse(JSON.stringify(defaultLinks)) };
        }

        function saveData() {
            var nodesToSave = nodes.map(function(n) {
                return { id: n.id, name: n.name, type: n.type, ico: n.ico, sidlo: n.sidlo,
                    founded: n.founded, kapital: n.kapital, cinnost: n.cinnost, popis: n.popis,
                    nickname: n.nickname, dphStatus: n.dphStatus || "" };
            });
            var linksToSave = links.map(function(l) {
                return { source: typeof l.source === 'object' ? l.source.id : l.source,
                    target: typeof l.target === 'object' ? l.target.id : l.target, share: l.share };
            });
            localStorage.setItem(STORAGE_KEY_NODES, JSON.stringify(nodesToSave));
            localStorage.setItem(STORAGE_KEY_LINKS, JSON.stringify(linksToSave));
        }

        function loadPositions() { try { var s = localStorage.getItem(STORAGE_KEY_POSITIONS); return s ? JSON.parse(s) : null; } catch(e) { return null; } }
        function savePositions() { var p = {}; nodes.forEach(function(n) { p[n.id] = { x: n.x, y: n.y }; }); localStorage.setItem(STORAGE_KEY_POSITIONS, JSON.stringify(p)); }
        function loadNicknames() { try { var s = localStorage.getItem(STORAGE_KEY_NICKNAMES); return s ? JSON.parse(s) : null; } catch(e) { return null; } }
        function saveNicknames() { var d = {}; nodes.forEach(function(n) { d[n.id] = n.nickname || ""; }); localStorage.setItem(STORAGE_KEY_NICKNAMES, JSON.stringify(d)); }
        function loadBubbles() { try { var s = localStorage.getItem(STORAGE_KEY_BUBBLES); return s ? JSON.parse(s) : []; } catch(e) { return []; } }
        function saveBubbles() { localStorage.setItem(STORAGE_KEY_BUBBLES, JSON.stringify(bubbles)); }

        // ============ INIT DATA ============
        var data = loadData();
        var nodes = data.nodes;
        var links = data.links;
        var bubbles = loadBubbles();

        // New luxury color palette
        var colors = { person: "#c9956b", holding: "#c45b52", subholding: "#d4a03c", daughter: "#5b6abf", granddaughter: "#8b7ec8", standalone: "#4a9b7f", external: "#b87333" };
        var sizes = { person: 45, holding: 40, subholding: 35, daughter: 28, granddaughter: 24, standalone: 30, external: 25 };
        var typeLabels = { person: "Fyzická osoba", holding: "Hlavní holding", subholding: "Sub-holding", daughter: "Dceřiná společnost", granddaughter: "Vnukovská společnost", standalone: "Přímo vlastněná", external: "Externí" };

        var width = window.innerWidth, height = window.innerHeight;
        var centerX = width / 2;
        var savedPositions = loadPositions();
        var savedNicknames = loadNicknames();

        nodes.forEach(function(n) {
            if (savedPositions && savedPositions[n.id]) { n.x = savedPositions[n.id].x; n.y = savedPositions[n.id].y; }
            else if (defaultPositions[n.id]) { n.x = defaultPositions[n.id].x; n.y = defaultPositions[n.id].y; }
            else { n.x = centerX + (Math.random() - 0.5) * 200; n.y = 400 + (Math.random() - 0.5) * 200; }
            n.fx = n.x; n.fy = n.y;
            if (savedNicknames && savedNicknames[n.id]) n.nickname = savedNicknames[n.id];
        });

        function updateStats() {
            document.getElementById('statCount').textContent = nodes.length;
            var maxLevel = 0;
            nodes.forEach(function(n) {
                var level = 0, current = n.id;
                while (current) {
                    var ltp = links.find(function(l) { return (typeof l.target === 'object' ? l.target.id : l.target) === current; });
                    if (ltp) { level++; current = typeof ltp.source === 'object' ? ltp.source.id : ltp.source; } else break;
                }
                if (level > maxLevel) maxLevel = level;
            });
            document.getElementById('statLevels').textContent = maxLevel + 1;
        }
        updateStats();

        // ============ D3 SETUP ============
        var svg = d3.select("#graph").append("svg").attr("width", width).attr("height", height);
        var g = svg.append("g");
        var zoom = d3.zoom().scaleExtent([0.3, 3]).on("zoom", function(e) { g.attr("transform", e.transform); });
        svg.call(zoom);

        var defs = svg.append("defs");

        // Arrowhead - copper colored
        defs.append("marker").attr("id", "arrowhead").attr("viewBox", "-0 -5 10 10")
            .attr("refX", 20).attr("refY", 0).attr("orient", "auto")
            .attr("markerWidth", 7).attr("markerHeight", 7)
            .append("path").attr("d", "M 0,-4 L 8,0 L 0,4").attr("fill", "#8a8698");

        // Glow filter
        var glowFilter = defs.append("filter").attr("id", "glow").attr("x", "-50%").attr("y", "-50%").attr("width", "200%").attr("height", "200%");
        glowFilter.append("feGaussianBlur").attr("stdDeviation", "6").attr("result", "blur");
        var gm = glowFilter.append("feMerge");
        gm.append("feMergeNode").attr("in", "blur");
        gm.append("feMergeNode").attr("in", "SourceGraphic");

        // Radial gradients for each node type
        Object.keys(colors).forEach(function(type) {
            var grad = defs.append("radialGradient").attr("id", "grad-" + type).attr("cx", "35%").attr("cy", "35%");
            grad.append("stop").attr("offset", "0%").attr("stop-color", d3.color(colors[type]).brighter(0.8));
            grad.append("stop").attr("offset", "100%").attr("stop-color", d3.color(colors[type]).darker(0.3));
        });

        // Background: subtle cross-hatch grid
        var gridPattern = defs.append("pattern").attr("id", "gridPattern").attr("width", 40).attr("height", 40).attr("patternUnits", "userSpaceOnUse");
        gridPattern.append("circle").attr("cx", 20).attr("cy", 20).attr("r", 0.7).attr("fill", "rgba(201,149,107,0.06)");

        svg.insert("rect", ":first-child").attr("width", "100%").attr("height", "100%").attr("fill", "url(#gridPattern)");

        // Process links
        var nodeById = new Map(nodes.map(function(n) { return [n.id, n]; }));
        links.forEach(function(l) {
            if (typeof l.source === 'string') l.source = nodeById.get(l.source);
            if (typeof l.target === 'string') l.target = nodeById.get(l.target);
        });

        var bubbleGroup = g.append("g").attr("class", "bubbles");
        var linkGroup = g.append("g").attr("class", "links");
        var linkLabelGroup = g.append("g").attr("class", "link-labels");
        var nodeGroup = g.append("g").attr("class", "nodes");

        function curvedLinkPath(d) {
            var sx = d.source.x, sy = d.source.y, tx = d.target.x, ty = d.target.y;
            var dx = tx - sx, dy = ty - sy;
            var dr = Math.sqrt(dx * dx + dy * dy) * 0.9;
            return "M" + sx + "," + sy + "A" + dr + "," + dr + " 0 0,1 " + tx + "," + ty;
        }

        function renderBubbles() {
            bubbleGroup.selectAll("*").remove();
            var bubble = bubbleGroup.selectAll(".bubble").data(bubbles).enter().append("g")
                .attr("class", "bubble")
                .attr("transform", function(d) { return "translate(" + d.x + "," + d.y + ")"; })
                .call(d3.drag()
                    .on("drag", function(e, d) { d.x = e.x; d.y = e.y; d3.select(this).attr("transform", "translate(" + d.x + "," + d.y + ")"); })
                    .on("end", function() { saveBubbles(); }))
                .on("click", function(e, d) { e.stopPropagation(); openBubbleModal(d); });

            bubble.append("circle").attr("r", function(d) { return d.radius || 100; })
                .attr("fill", function(d) { return d.color; }).attr("stroke", function(d) { return d.color; });
            bubble.append("text").attr("class", "bubble-label").attr("x", 0)
                .attr("y", function(d) { return (d.radius || 100) + 20; })
                .attr("text-anchor", "middle").attr("fill", function(d) { return d.color; })
                .text(function(d) { return d.name; });
            bubble.append("circle").attr("class", "resize-handle").attr("cx", 0)
                .attr("cy", function(d) { return d.radius || 100; }).attr("r", 14)
                .attr("fill", function(d) { return d.color; }).attr("stroke", "#fff").attr("stroke-width", 2)
                .call(d3.drag()
                    .on("start", function(e, d) { e.sourceEvent.stopPropagation(); d._startRadius = d.radius; d._startY = e.y; })
                    .on("drag", function(e, d) {
                        var parent = d3.select(this.parentNode);
                        d.radius = Math.max(50, d._startRadius + (e.y - d._startY));
                        parent.select("circle:first-child").attr("r", d.radius);
                        parent.select(".bubble-label").attr("y", d.radius + 20);
                        d3.select(this).attr("cy", d.radius);
                        parent.select(".delete-handle").attr("cy", -d.radius - 5);
                    })
                    .on("end", function(e, d) { delete d._startRadius; delete d._startY; saveBubbles(); }));
            bubble.append("text").attr("class", "delete-handle").attr("x", 0)
                .attr("y", function(d) { return -(d.radius || 100) - 5; })
                .attr("text-anchor", "middle").attr("fill", "#c45b52").attr("font-size", "16px").attr("cursor", "pointer")
                .text("\u2715")
                .on("click", function(e, d) {
                    e.stopPropagation();
                    showDialog("Smazat bublinu '" + d.name + "'?", { danger: true, confirmText: 'Smazat' }).then(function(ok) {
                        if (ok) { var idx = bubbles.findIndex(function(b) { return b.id === d.id; }); if (idx >= 0) bubbles.splice(idx, 1); saveBubbles(); renderBubbles(); }
                    });
                });
        }

        function render() {
            linkGroup.selectAll("*").remove();
            linkLabelGroup.selectAll("*").remove();
            nodeGroup.selectAll("*").remove();

            var validLinks = links.filter(function(l) { return l.source && l.target; });

            var link = linkGroup.selectAll("path").data(validLinks).enter().append("path")
                .attr("class", "link").attr("stroke", "#5e5b6e").attr("stroke-width", 2)
                .attr("marker-end", "url(#arrowhead)").attr("d", curvedLinkPath);

            var linkLabel = linkLabelGroup.selectAll("text").data(validLinks).enter().append("text")
                .attr("class", "link-label").text(function(d) { return d.share; })
                .attr("x", function(d) { return (d.source.x + d.target.x) / 2; })
                .attr("y", function(d) { return (d.source.y + d.target.y) / 2 - 8; });

            var node = nodeGroup.selectAll(".node").data(nodes).enter().append("g").attr("class", "node")
                .attr("transform", function(d) { return "translate(" + d.x + "," + d.y + ")"; })
                .call(d3.drag()
                    .on("start", function() { d3.select(this).raise(); })
                    .on("drag", function(e, d) {
                        d.x = e.x; d.y = e.y; d.fx = e.x; d.fy = e.y;
                        d3.select(this).attr("transform", "translate(" + d.x + "," + d.y + ")");
                        link.filter(function(l) { return l.source === d || l.target === d; }).attr("d", curvedLinkPath);
                        linkLabel.filter(function(l) { return l.source === d || l.target === d; })
                            .attr("x", function(l) { return (l.source.x + l.target.x) / 2; })
                            .attr("y", function(l) { return (l.source.y + l.target.y) / 2 - 8; });
                    })
                    .on("end", function() { savePositions(); }))
                .on("click", function(e, d) {
                    var self = this;
                    if (self.clickTimer) { clearTimeout(self.clickTimer); self.clickTimer = null; return; }
                    self.clickTimer = setTimeout(function() { self.clickTimer = null; showDetail(d); }, 250);
                })
                .on("mouseover", function(e, d) {
                    var t = document.getElementById("tooltip");
                    t.textContent = d.name + (d.ico ? " (IČO: " + d.ico + ")" : "");
                    t.style.left = (e.pageX + 15) + "px"; t.style.top = (e.pageY - 10) + "px";
                    t.classList.add("visible");
                    d3.select(this).select(".node-core").attr("filter", "url(#glow)");
                })
                .on("mouseout", function() {
                    document.getElementById("tooltip").classList.remove("visible");
                    d3.select(this).select(".node-core").attr("filter", null);
                });

            // Outer decorative ring
            node.append("circle").attr("class", "node-ring")
                .attr("r", function(d) { return (sizes[d.type] || 25) + 6; })
                .attr("stroke", function(d) { return colors[d.type] || "#888"; });

            // Core circle with gradient
            node.append("circle").attr("class", "node-core")
                .attr("r", function(d) { return sizes[d.type] || 25; })
                .attr("fill", function(d) { return "url(#grad-" + d.type + ")"; })
                .attr("stroke", function(d) { return d3.color(colors[d.type] || "#888").darker(0.4); });

            // DPH indicator
            node.filter(function(d) { return d.dphStatus && dphColors[d.dphStatus]; })
                .append("circle")
                .attr("class", function(d) { return "dph-indicator" + (d.dphStatus === "proces" ? " dph-pulse" : ""); })
                .attr("r", 7)
                .attr("cx", function(d) { return (sizes[d.type] || 25) * 0.7; })
                .attr("cy", function(d) { return -(sizes[d.type] || 25) * 0.7; })
                .attr("fill", function(d) { return dphColors[d.dphStatus]; });

            node.append("text").attr("dy", -5).attr("text-anchor", "middle")
                .text(function(d) { return d.name.replace(" s.r.o.", "").replace(", s.r.o.", "").split(" ").slice(0, 2).join(" "); });
            node.append("text").attr("class", "ico").attr("dy", 10).attr("text-anchor", "middle")
                .text(function(d) { return d.ico || ""; });
            node.append("text").attr("class", "nickname").attr("dy", 25).attr("text-anchor", "middle")
                .text(function(d) { return d.nickname || ""; }).style("cursor", "text");

            node.on("dblclick", function(e, d) {
                e.stopPropagation();
                if (window.activeEditor) { window.activeEditor.remove(); window.activeEditor = null; }
                var nodeEl = d3.select(this);
                var nodeSize = sizes[d.type] || 25;
                var fo = nodeEl.append("foreignObject").attr("x", -45).attr("y", nodeSize + 5).attr("width", 90).attr("height", 25);
                var input = fo.append("xhtml:input").attr("type", "text").attr("class", "nickname-input")
                    .attr("placeholder", "nickname...").attr("value", d.nickname || "").node();
                window.activeEditor = fo;
                setTimeout(function() { input.focus(); }, 10);
                function saveNicknameEdit() {
                    d.nickname = input.value.trim(); nodeEl.select(".nickname").text(d.nickname);
                    saveNicknames(); fo.remove(); window.activeEditor = null;
                }
                input.addEventListener("keydown", function(ke) {
                    if (ke.key === "Enter") saveNicknameEdit();
                    else if (ke.key === "Escape") { fo.remove(); window.activeEditor = null; }
                });
                input.addEventListener("blur", function() { setTimeout(saveNicknameEdit, 100); });
            });

            updateStats();
        }

        render();
        renderBubbles();

        // ============ DETAIL PANEL ============
        var currentDetailNode = null;

        function showDetail(d) {
            currentDetailNode = d;
            var panel = document.getElementById("detailPanel");
            var content = document.getElementById("detailContent");
            while (content.firstChild) content.removeChild(content.firstChild);

            var header = document.createElement("div");
            header.className = "detail-header";

            var typeSpan = document.createElement("div");
            typeSpan.className = "detail-type";
            typeSpan.style.background = colors[d.type] || "#888";
            typeSpan.style.color = (d.type === "subholding" || d.type === "external" || d.type === "person") ? "#1a1a2e" : "#fff";
            typeSpan.textContent = typeLabels[d.type] || d.type;
            header.appendChild(typeSpan);

            var nameDiv = document.createElement("div");
            nameDiv.className = "detail-name";
            nameDiv.textContent = d.name;
            header.appendChild(nameDiv);

            if (d.ico) {
                var icoDiv = document.createElement("div");
                icoDiv.className = "detail-ico";
                icoDiv.textContent = "IČO: " + d.ico;
                header.appendChild(icoDiv);
            }

            if (d.dphStatus && dphLabels[d.dphStatus]) {
                var dphDiv = document.createElement("div");
                dphDiv.className = "dph-badge " + d.dphStatus;
                var dot = document.createElement("span");
                dot.className = "dph-dot";
                dot.style.background = dphColors[d.dphStatus];
                dphDiv.appendChild(dot);
                dphDiv.appendChild(document.createTextNode(dphLabels[d.dphStatus]));
                header.appendChild(dphDiv);
            }

            if (d.popis) {
                var popisDiv = document.createElement("div");
                popisDiv.className = "detail-popis";
                popisDiv.textContent = d.popis;
                header.appendChild(popisDiv);
            }

            content.appendChild(header);

            // Action buttons right after header
            var actions = document.createElement("div");
            actions.className = "detail-actions";
            actions.style.marginBottom = "22px";

            var editBtn = createIconButton(ICON_EDIT, 'Upravit', 'detail-btn edit');
            editBtn.onclick = function() { openEditModal(d); };
            actions.appendChild(editBtn);

            if (d.type !== "person") {
                var ownerBtn = createIconButton(ICON_LINK, 'Změnit vlastníka', 'detail-btn change-owner');
                ownerBtn.onclick = function() { openOwnerModal(d); };
                actions.appendChild(ownerBtn);

                var currentLnk = links.find(function(l) { return l.target && l.target.id === d.id; });
                if (currentLnk) {
                    var disconnectBtn = createIconButton(ICON_UNLINK, 'Odpojit', 'detail-btn disconnect');
                    disconnectBtn.onclick = function() { disconnectNode(d); };
                    actions.appendChild(disconnectBtn);
                }

                var deleteBtn = createIconButton(ICON_TRASH, 'Smazat', 'detail-btn delete');
                deleteBtn.onclick = function() { deleteNode(d); };
                actions.appendChild(deleteBtn);
            }
            content.appendChild(actions);

            // Basic info
            if (d.type !== "person") {
                var section = document.createElement("div");
                section.className = "detail-section";
                var h3 = document.createElement("h3"); h3.textContent = "Základní údaje"; section.appendChild(h3);
                [["Sídlo", d.sidlo], ["Založeno", d.founded], ["Základní kapitál", d.kapital], ["Předmět činnosti", d.cinnost]].forEach(function(pair) {
                    if (pair[1]) {
                        var row = document.createElement("div"); row.className = "detail-row";
                        var lbl = document.createElement("span"); lbl.className = "detail-row-label"; lbl.textContent = pair[0];
                        var val = document.createElement("span"); val.className = "detail-row-value"; val.textContent = pair[1];
                        row.appendChild(lbl); row.appendChild(val); section.appendChild(row);
                    }
                });
                content.appendChild(section);
            }

            // Ownership chain
            var chain = [], current = d.id;
            while (current) {
                var ltp = links.find(function(l) { return l.target && l.target.id === current; });
                if (ltp && ltp.source) { chain.unshift({ name: ltp.source.name, share: ltp.share }); current = ltp.source.id; } else break;
            }
            if (chain.length > 0) {
                var cs = document.createElement("div"); cs.className = "detail-section";
                var h3c = document.createElement("h3"); h3c.textContent = "Vlastnický řetězec"; cs.appendChild(h3c);
                var cd = document.createElement("div"); cd.className = "ownership-chain";
                chain.forEach(function(c) {
                    var item = document.createElement("div"); item.className = "ownership-item"; item.textContent = c.name;
                    var pct = document.createElement("span"); pct.className = "ownership-percent"; pct.textContent = c.share;
                    item.appendChild(pct); cd.appendChild(item);
                    var arrow = document.createElement("div"); arrow.className = "ownership-arrow"; arrow.textContent = "\u2193"; cd.appendChild(arrow);
                });
                var fin = document.createElement("div"); fin.className = "ownership-item"; fin.style.fontWeight = "600"; fin.textContent = d.name;
                cd.appendChild(fin); cs.appendChild(cd); content.appendChild(cs);
            }

            // Subsidiaries
            var subs = links.filter(function(l) { return l.source && l.source.id === d.id; }).map(function(l) { return { name: l.target.name, share: l.share }; });
            if (subs.length > 0) {
                var ss = document.createElement("div"); ss.className = "detail-section";
                var h3s = document.createElement("h3"); h3s.textContent = "Vlastní (" + subs.length + ")"; ss.appendChild(h3s);
                subs.forEach(function(s) {
                    var row = document.createElement("div"); row.className = "detail-row";
                    var lbl = document.createElement("span"); lbl.className = "detail-row-label"; lbl.textContent = s.name;
                    var val = document.createElement("span"); val.className = "detail-row-value"; val.style.color = "#c9956b"; val.textContent = s.share;
                    row.appendChild(lbl); row.appendChild(val); ss.appendChild(row);
                });
                content.appendChild(ss);
            }

            panel.classList.add("open");
        }

        // ============ MODALS ============
        var editingNode = null;

        function populateOwnerSelect(sel, excludeId) {
            while (sel.firstChild) sel.removeChild(sel.firstChild);
            var empty = document.createElement("option"); empty.value = ""; empty.textContent = "-- Bez vlastníka (nezávislá) --"; sel.appendChild(empty);
            nodes.forEach(function(n) {
                if (n.id !== excludeId) { var o = document.createElement("option"); o.value = n.id; o.textContent = n.name; sel.appendChild(o); }
            });
        }

        function openAddModal() {
            editingNode = null;
            document.getElementById("modalTitle").textContent = "Přidat firmu";
            document.getElementById("modalName").value = "";
            document.getElementById("modalIco").value = "";
            document.getElementById("modalType").value = "daughter";
            document.getElementById("modalShare").value = "100%";
            document.getElementById("modalSidlo").value = "";
            document.getElementById("modalPopis").value = "";
            document.getElementById("modalDph").value = "";
            populateOwnerSelect(document.getElementById("modalOwner"), null);
            document.getElementById("companyModal").classList.add("open");
        }

        function openEditModal(d) {
            editingNode = d;
            document.getElementById("modalTitle").textContent = "Upravit firmu";
            document.getElementById("modalName").value = d.name;
            document.getElementById("modalIco").value = d.ico || "";
            document.getElementById("modalType").value = d.type;
            document.getElementById("modalSidlo").value = d.sidlo || "";
            document.getElementById("modalPopis").value = d.popis || "";
            document.getElementById("modalDph").value = d.dphStatus || "";
            populateOwnerSelect(document.getElementById("modalOwner"), d.id);
            var cl = links.find(function(l) { return l.target && l.target.id === d.id; });
            document.getElementById("modalOwner").value = cl ? cl.source.id : "";
            document.getElementById("modalShare").value = cl ? cl.share : "100%";
            document.getElementById("companyModal").classList.add("open");
        }

        function saveModal() {
            var name = document.getElementById("modalName").value.trim();
            if (!name) { showDialog("Název firmy je povinný!", { type: 'alert' }); return; }
            var type = document.getElementById("modalType").value;
            var ico = document.getElementById("modalIco").value.trim();
            var sidlo = document.getElementById("modalSidlo").value.trim();
            var popis = document.getElementById("modalPopis").value.trim();
            var dphStatus = document.getElementById("modalDph").value;
            var ownerId = document.getElementById("modalOwner").value;
            var share = document.getElementById("modalShare").value.trim() || "100%";

            if (editingNode) {
                editingNode.name = name; editingNode.type = type; editingNode.ico = ico;
                editingNode.sidlo = sidlo; editingNode.popis = popis; editingNode.dphStatus = dphStatus;
                var eli = links.findIndex(function(l) { return l.target && l.target.id === editingNode.id; });
                if (ownerId) {
                    var on = nodeById.get(ownerId);
                    if (eli >= 0) { links[eli].source = on; links[eli].share = share; }
                    else links.push({ source: on, target: editingNode, share: share });
                } else { if (eli >= 0) links.splice(eli, 1); }
            } else {
                var id = name.toLowerCase().replace(/[^a-z0-9]/g, '_').substring(0, 20) + '_' + Date.now();
                var nn = { id: id, name: name, type: type, ico: ico, sidlo: sidlo, popis: popis, dphStatus: dphStatus,
                    founded: "", kapital: "", cinnost: "", nickname: "",
                    x: centerX + (Math.random() - 0.5) * 300, y: 400 + (Math.random() - 0.5) * 200 };
                nn.fx = nn.x; nn.fy = nn.y; nodes.push(nn); nodeById.set(id, nn);
                if (ownerId) links.push({ source: nodeById.get(ownerId), target: nn, share: share });
            }
            saveData(); savePositions(); render();
            document.getElementById("companyModal").classList.remove("open");
            if (editingNode) showDetail(editingNode);
        }

        function openOwnerModal(d) {
            document.getElementById("ownerModalInfo").textContent = "Firma: " + d.name;
            populateOwnerSelect(document.getElementById("ownerModalSelect"), d.id);
            var cl = links.find(function(l) { return l.target && l.target.id === d.id; });
            document.getElementById("ownerModalSelect").value = cl ? cl.source.id : "";
            document.getElementById("ownerModalShare").value = cl ? cl.share : "100%";
            document.getElementById("ownerModal").dataset.nodeId = d.id;
            document.getElementById("ownerModal").classList.add("open");
        }

        function saveOwnerModal() {
            var nid = document.getElementById("ownerModal").dataset.nodeId;
            var nd = nodeById.get(nid);
            var noi = document.getElementById("ownerModalSelect").value;
            var share = document.getElementById("ownerModalShare").value.trim() || "100%";
            var eli = links.findIndex(function(l) { return l.target && l.target.id === nid; });
            if (eli >= 0) links.splice(eli, 1);
            if (noi) links.push({ source: nodeById.get(noi), target: nd, share: share });
            saveData(); render();
            document.getElementById("ownerModal").classList.remove("open");
            showDetail(nd);
        }

        function disconnectNode(d) {
            showDialog("Odpojit firmu " + d.name + " od vlastníka?", { confirmText: 'Odpojit', danger: true }).then(function(ok) {
                if (!ok) return;
                var li = links.findIndex(function(l) { return l.target && l.target.id === d.id; });
                if (li >= 0) { links.splice(li, 1); saveData(); render(); showDetail(d); }
            });
        }

        function deleteNode(d) {
            showDialog("Opravdu smazat firmu " + d.name + "?\n\nToto také smaže všechny vazby na tuto firmu!", { confirmText: 'Smazat', danger: true }).then(function(ok) {
                if (!ok) return;
                for (var i = links.length - 1; i >= 0; i--) {
                    if ((links[i].source && links[i].source.id === d.id) || (links[i].target && links[i].target.id === d.id)) links.splice(i, 1);
                }
                var ni = nodes.findIndex(function(n) { return n.id === d.id; });
                if (ni >= 0) nodes.splice(ni, 1);
                nodeById.delete(d.id);
                saveData(); render(); document.getElementById("detailPanel").classList.remove("open");
            });
        }

        // ============ BUBBLE MODAL ============
        var editingBubble = null;
        var selectedBubbleColor = "#5b6abf";

        function openBubbleModal(bubble) {
            editingBubble = bubble || null;
            var del = document.getElementById("bubbleModalDelete");
            if (bubble) {
                document.getElementById("bubbleModalTitle").textContent = "Upravit bublinu";
                document.getElementById("bubbleName").value = bubble.name;
                selectedBubbleColor = bubble.color; del.style.display = "block";
            } else {
                document.getElementById("bubbleModalTitle").textContent = "Přidat bublinu";
                document.getElementById("bubbleName").value = "";
                selectedBubbleColor = "#5b6abf"; del.style.display = "none";
            }
            document.querySelectorAll(".bubble-color-option").forEach(function(el) {
                el.classList.toggle("selected", el.dataset.color === selectedBubbleColor);
            });
            document.getElementById("bubbleModal").classList.add("open");
        }

        function saveBubbleModal() {
            var name = document.getElementById("bubbleName").value.trim();
            if (!name) { showDialog("Název bubliny je povinný!", { type: 'alert' }); return; }
            if (editingBubble) { editingBubble.name = name; editingBubble.color = selectedBubbleColor; }
            else {
                bubbles.push({ id: "bubble_" + Date.now(), name: name, color: selectedBubbleColor,
                    x: centerX + (Math.random() - 0.5) * 200, y: 350 + (Math.random() - 0.5) * 100, radius: 120 });
            }
            saveBubbles(); renderBubbles(); document.getElementById("bubbleModal").classList.remove("open");
        }

        function deleteBubbleModal() {
            if (editingBubble) {
                showDialog("Smazat bublinu '" + editingBubble.name + "'?", { danger: true, confirmText: 'Smazat' }).then(function(ok) {
                    if (ok) {
                        var idx = bubbles.findIndex(function(b) { return b.id === editingBubble.id; });
                        if (idx >= 0) bubbles.splice(idx, 1);
                        saveBubbles(); renderBubbles(); document.getElementById("bubbleModal").classList.remove("open");
                    }
                });
            }
        }

        // ============ EVENT LISTENERS ============
        document.getElementById("closeBtn").onclick = function() { document.getElementById("detailPanel").classList.remove("open"); };
        document.getElementById("addCompanyBtn").onclick = openAddModal;
        document.getElementById("addBubbleBtn").onclick = function() { openBubbleModal(null); };
        document.getElementById("modalCancel").onclick = function() { document.getElementById("companyModal").classList.remove("open"); };
        document.getElementById("modalSave").onclick = saveModal;
        document.getElementById("ownerModalCancel").onclick = function() { document.getElementById("ownerModal").classList.remove("open"); };
        document.getElementById("ownerModalSave").onclick = saveOwnerModal;
        document.getElementById("bubbleModalCancel").onclick = function() { document.getElementById("bubbleModal").classList.remove("open"); };
        document.getElementById("bubbleModalSave").onclick = saveBubbleModal;
        document.getElementById("bubbleModalDelete").onclick = deleteBubbleModal;

        document.querySelectorAll(".bubble-color-option").forEach(function(el) {
            el.onclick = function() {
                document.querySelectorAll(".bubble-color-option").forEach(function(e) { e.classList.remove("selected"); });
                this.classList.add("selected"); selectedBubbleColor = this.dataset.color;
            };
        });

        document.getElementById("legendToggle").onclick = function() { document.getElementById("legend").classList.toggle("collapsed"); };

        document.getElementById("zoomInBtn").onclick = function() { svg.transition().duration(300).call(zoom.scaleBy, 1.3); };
        document.getElementById("zoomOutBtn").onclick = function() { svg.transition().duration(300).call(zoom.scaleBy, 0.7); };
        document.getElementById("resetBtn").onclick = function() { svg.transition().duration(500).call(zoom.transform, d3.zoomIdentity); };
        document.getElementById("resetPosBtn").onclick = function() {
            showDialog("Resetovat všechny pozice na výchozí hodnoty?", { confirmText: 'Resetovat' }).then(function(ok) {
                if (ok) { localStorage.removeItem(STORAGE_KEY_POSITIONS); location.reload(); }
            });
        };

        document.getElementById("exportBtn").onclick = function() {
            var ed = { nodes: localStorage.getItem(STORAGE_KEY_NODES), links: localStorage.getItem(STORAGE_KEY_LINKS),
                positions: localStorage.getItem(STORAGE_KEY_POSITIONS), nicknames: localStorage.getItem(STORAGE_KEY_NICKNAMES),
                bubbles: localStorage.getItem(STORAGE_KEY_BUBBLES), exportDate: new Date().toISOString() };
            var blob = new Blob([JSON.stringify(ed, null, 2)], { type: 'application/json' });
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a'); a.href = url; a.download = 'zajicek-holding-backup.json';
            document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
            showToast('Export dokončen - soubor stažen.');
        };

        document.getElementById("importBtn").onclick = function() { document.getElementById("importFile").click(); };
        document.getElementById("importFile").onchange = function(e) {
            var file = e.target.files[0]; if (!file) return;
            var reader = new FileReader();
            reader.onload = function(ev) {
                try {
                    var id = JSON.parse(ev.target.result);
                    if (id.nodes) localStorage.setItem(STORAGE_KEY_NODES, id.nodes);
                    if (id.links) localStorage.setItem(STORAGE_KEY_LINKS, id.links);
                    if (id.positions) localStorage.setItem(STORAGE_KEY_POSITIONS, id.positions);
                    if (id.nicknames) localStorage.setItem(STORAGE_KEY_NICKNAMES, id.nicknames);
                    if (id.bubbles) localStorage.setItem(STORAGE_KEY_BUBBLES, id.bubbles);
                    showToast('Data úspěšně importována! Stránka se obnoví.');
                    setTimeout(function() { location.reload(); }, 1500);
                } catch (err) { showToast('Chyba při importu: ' + err.message, 'error'); }
            };
            reader.readAsText(file); e.target.value = '';
        };

        document.addEventListener("keydown", function(e) {
            if (e.key === "Escape") {
                var dl = document.getElementById("dialogOverlay");
                if (dl.classList.contains("open")) { dl.classList.remove("open"); return; }
                document.getElementById("detailPanel").classList.remove("open");
                document.getElementById("companyModal").classList.remove("open");
                document.getElementById("ownerModal").classList.remove("open");
                document.getElementById("bubbleModal").classList.remove("open");
            }
        });

        ["companyModal", "ownerModal", "bubbleModal", "dialogOverlay"].forEach(function(id) {
            document.getElementById(id).onclick = function(e) {
                if (e.target.id === id) document.getElementById(id).classList.remove("open");
            };
        });

    })();
    </script>
</body>
</html>
